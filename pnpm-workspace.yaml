packages:
  - 'packages/*'
  - 'apps/*'
  - 'packages/driver-interface'
  - 'packages/driver-puppeteer'
  - 'packages/driver-playwright'

  # Third-party integrations
  - 'integrations/*'

  # Multi-language SDKs (future)
  - 'sdks/*'

catalog:
  # React ecosystem
  react: ^19.2.1
  react-dom: ^19.2.1
  "@types/react": ^19.2.1
  "@types/react-dom": ^19.2.1
  
  # Schema & validation
  zod: ^4.2.1
  
  # TypeScript tooling
  typescript: ^5.9.3
  "@types/node": ^24.10.2
  ts-node: ^10.9.1
  
  # Testing
  jest: ^29.5.0
  ts-jest: ^29.1.0
  "@types/jest": ^29.5.0
  vitest: ^0.34.0
  
  # Build tools
  vite: ^7.2.7
  vite-tsconfig-paths: ^6.0.3
  "@vitejs/plugin-react": ^5.1.2
  
  # TanStack ecosystem
  "@tanstack/react-router": ^1.136.18
  "@tanstack/react-start": ^1.136.18
  "@tanstack/router-plugin": ^1.132.0
  "@tanstack/react-query": ^5.66.5
  "@tanstack/router-generator": ^1.132.0
  "@tanstack/react-router-ssr-query": ^1.131.7
  "@tanstack/react-router-devtools": ^1.136.18
  "@tanstack/start-static-server-functions": ^1.136.18
  
  # Tailwind ecosystem (using v4 - latest)
  tailwindcss: ^4.1.17
  "@tailwindcss/vite": ^4.1.17
  autoprefixer: ^10.4.14
  postcss: ^8.4.24
  
  # Utility libraries
  clsx: ^2.1.1
  lucide-react: ^0.378.0
  tailwind-merge: ^2.3.0
  
  # Express & server
  express: ^4.17.3
  "@types/express": ^4.17.14
  cors: ^2.8.5
  "@types/cors": ^2.8.12
  helmet: ^6.0.0
  morgan: ^1.10.0
  "@types/morgan": ^1.9.3
  dotenv: ^16.0.0
  
  # Hono framework
  hono: ^3.0.0
  "@hono/node-server": ^1.0.0
  
  # Common utilities
  axios: ^1.4.0
  uuid: ^9.0.0
  "@types/uuid": ^8.3.4
  
  # Socket.io
  "socket.io": ^4.5.4
  "socket.io-client": ^4.7.5
  "@types/socket.io": ^3.0.2
  
  # Process management & logging
  pm2: ^5.3.0
  cabin: ^11.0.3
  axe: ^11.0.2
  winston: ^3.8.2
  
  # Other shared dependencies
  public-ip: 4.0.4
  response-time: ^2.3.2
  request-received: ^0.0.3
  express-request-id: 1.4.1
  "@elastic/elasticsearch": ^9.2.0
  prettier: ^3.0.0
  serve: ^14.2.5
  nitro: ^2.2.28
  "@types/tar-fs": ^2.0.0
  
  # Browser automation
  puppeteer: ^22.0.0
  puppeteer-extra: ^3.3.6
  playwright: ^1.41.0
